<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1>⚙️ Settings</h1>
        <div class="topbar-actions">
            <button class="icon-btn" id="darkToggle">🌙</button>
            <a href="/" class="icon-btn">🏠</a>
        </div>
    </div>
    <p class="subtitle">Configure your transfer tool</p>

    <div style="background:var(--border);padding:14px;border-radius:10px;margin-bottom:20px;word-break:break-all">
        <strong style="color:var(--accent)">Current save location:</strong><br>
        <span id="currentPath">Loading...</span>
    </div>

    <div style="margin-bottom:20px">
        <label style="display:block;font-weight:600;margin-bottom:8px;color:var(--text)">Save Location</label>
        <input type="text" id="downloadFolder" placeholder="F:\PhoneMedia" 
               style="width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--card);color:var(--text)">
        <div style="font-size:12px;color:var(--text-muted);margin-top:6px">
            Enter full path (e.g., F:\PhoneMedia or C:\Users\YourName\Downloads\Photos)
        </div>
    </div>

    <button id="saveBtn">Save Settings</button>
    <div class="status" id="status"></div>
</div>

<script>
// Theme
function loadTheme() {
    fetch('/api/settings').then(r => r.json()).then(s => {
        document.documentElement.setAttribute('data-theme', s.darkMode ? 'dark' : 'light');
        document.getElementById('darkToggle').textContent = s.darkMode ? '☀️' : '🌙';
    });
}
document.getElementById('darkToggle').addEventListener('click', async () => {
    const current = document.documentElement.getAttribute('data-theme') === 'dark';
    await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ darkMode: !current })
    });
    loadTheme();
});
loadTheme();

// Load settings
async function loadSettings() {
    const res = await fetch('/api/settings');
    const settings = await res.json();
    document.getElementById('downloadFolder').value = settings.downloadFolder;
    document.getElementById('currentPath').textContent = settings.downloadFolder;
}

// Save settings
document.getElementById('saveBtn').addEventListener('click', async () => {
    const downloadFolder = document.getElementById('downloadFolder').value.trim();
    const status = document.getElementById('status');
    
    if (!downloadFolder) {
        status.className = 'status error';
        status.textContent = '❌ Please enter a valid path';
        status.style.display = 'block';
        return;
    }

    try {
        const res = await fetch('/api/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ downloadFolder })
        });
        const result = await res.json();
        if (result.success) {
            status.className = 'status success';
            status.textContent = '✅ Settings saved! Files will be saved to: ' + downloadFolder;
            status.style.display = 'block';
            document.getElementById('currentPath').textContent = downloadFolder;
            setTimeout(() => window.location.href = '/', 2000);
        } else {
            throw new Error(result.error || 'Failed to save');
        }
    } catch (e) {
        status.className = 'status error';
        status.textContent = '❌ ' + e.message;
        status.style.display = 'block';
    }
});

loadSettings();
</script>
</body>
</html>
